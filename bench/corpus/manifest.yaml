# bench/corpus/manifest.yaml
#
# 每個 entry 欄位說明：
#   id          : 唯一鍵，用於 report 目錄名
#   file        : 相對於 bench/corpus/ 的路徑
#   category    : academic | cjk | tables | scanned | patents
#   tier        : simple（有文字層，可 pseudo-GT）| hard（需人工 GT）
#   pages       : "all" | "N-M" | "N"  （限制測試頁範圍）
#   image_mode  : base（預設）
#   gt          : pdf_text（自動）| manual（人工）
#   source      : 下載來源 URL（參考用）
#   notes       : 說明

# ── Academic ──────────────────────────────────────────────────────────────────
- id: academic_unlimited_ocr
  file: academic/unlimited-ocr.pdf
  category: academic
  tier: simple
  pages: "3-4"
  image_mode: base
  gt: pdf_text
  notes: "born-digital paper, clean body pages (Introduction + Related Works)"

# ── CJK ───────────────────────────────────────────────────────────────────────
- id: cjk_hk_csb_circulars
  file: cjk/hk_csb_circulars.pdf
  category: cjk
  tier: simple
  pages: "1-10"
  image_mode: base
  gt: pdf_text
  source: "https://www.csb.gov.hk/tc_chi/publications_stat/publication/files/circulars_2ed.pdf"
  notes: "HK CSB 政府公文寫作手冊；born-digital 繁中、單欄、文字為主 → pseudo-GT 可用"

- id: cjk_tw_stat_040
  file: cjk/tw_stat_040.pdf
  category: cjk
  tier: hard
  pages: "1-5"
  image_mode: base
  gt: manual
  source: "https://www.civil.taichung.gov.tw/media/656044/國情統計通報-第040號.pdf"
  notes: "台灣主計總處 國情統計通報 040；繁中＋統計表＋圖混排 → 需人工 GT"

# ── Tables ────────────────────────────────────────────────────────────────────
- id: tables_fsoc2025
  file: tables/fsoc2025.pdf
  category: tables
  tier: hard
  pages: "1-5"
  image_mode: base
  gt: manual
  source: "https://home.treasury.gov/system/files/261/FSOC2025AnnualReport.pdf"
  notes: "US Treasury FSOC 2025 Annual Report；密集財務表格，檔大（~200 頁）→ 需人工 GT"

- id: tables_us8110241b2
  file: tables/us8110241b2.pdf
  category: tables
  tier: hard
  pages: "1-5"
  image_mode: base
  gt: manual
  source: "https://patents.google.com/patent/US8110241B2/en"
  notes: "US8110241B2 專利；含密集表格＋示意圖 → 需人工 GT"

