# ── Human（使用者提供的難題：合約/表格/手寫）──────────────────────────────────
- id: human_docs
  file: human/human_docs.pdf
  category: human
  tier: hard
  pages: "all"
  image_mode: base
  gt: manual
  notes: "4 張合成：中文合約、中文合約含表×2、英文手寫；難題（手寫/合約表格/翻拍）→ 需人工 GT。單張若想更細可改 image_mode: gundam"

